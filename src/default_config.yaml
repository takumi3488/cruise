command:
  - claude
  - --model
  - "{model}"
  - -p  # prompt is passed via stdin at runtime

model: sonnet
plan_model: opus

steps:
  implement:
    prompt: |
      Please implement according to {plan}.

  test:
    command: echo "No test command configured. Edit your workflow config to add tests."

  fix-test-error:
    skip: prev.success
    prompt: |
      The following error occurred. Please correct it:
      ---
      {prev.stderr}
    next: test

