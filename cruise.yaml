command:
  - claude
  - --model
  - "{model}"
  - -p

model: sonnet

plan: .cruise/plan.md
state: .cruise/state.json

steps:
  plan:
    model: opus
    instruction: "What will you do?"
    prompt: |
      I am trying to implement the following features. Create an implementation plan and write it to {plan}.
      ---
      {input}

  approve-plan:
    plan: "{plan}"
    option:
      - selector: Approve
        next: write-tests
      - text-input: Fix
        next: fix-plan
      - text-input: Ask
        next: ask-plan

  fix-plan:
    model: opus
    prompt: |
      The user has requested the following changes to the {plan} implementation plan. Make the modifications:
      {prev.input}
    next: approve-plan

  ask-plan:
    prompt: |
      The user has the following questions about the implementation plan for {plan}. Provide answers:
      {prev.input}
    next: approve-plan

  write-tests:
    prompt: |
      Based on the {plan} implementation schedule, please first create the test code, then update the {plan} if necessary.

  implement:
    prompt: |
      Tests have been created according to {plan}. Please implement them to pass. If necessary, update {plan}.

  test:
    command:
      - cargo fmt --all
      - cargo clippy --fix --allow-dirty --all-targets --all-features -- -D warnings
      - cargo test --all-features

  fix-test-error:
    skip: prev.success
    prompt: |
      The following error occurred. Please correct it:
      ---
      {prev.stderr}
    next: test

  coderabbit:
    prompt: |
      Run `coderabbit --prompt-only` to address any reasonable suggestions.
      Since coderabbit doesn't fully understand the entire project, feel free to ignore any incorrect suggestions.
      Also, prioritize adhering to existing code style guidelines over following the suggestions.
      If coderabbit's rate limit is reached, wait an appropriate amount of time before retrying.
    if:
      file-changed: test

  simplify:
    model: opus
    prompt: /simplify
    if:
      file-changed: test

  improve:
    prompt: /improve
    if:
      file-changed: test

  pr:
    prompt: Please create a PR and provide the URL
